<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена - SteelStyle</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            padding: 40px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #c0a47d;
            text-shadow: 0 0 20px rgba(192, 164, 125, 0.5);
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .error-message {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 30px;
            color: #c0a47d;
        }
        
        .message {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .decoration {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c0a47d, transparent);
            margin: 30px auto;
        }
        
        .btn {
            display: inline-block;
            background: #c0a47d;
            color: #000;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background: #d4b794;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(192, 164, 125, 0.4);
        }
        
        .footer {
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.6;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(192, 164, 125, 0.5);
            }
            to {
                text-shadow: 0 0 30px rgba(192, 164, 125, 0.8), 0 0 50px rgba(192, 164, 125, 0.5);
            }
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }
            
            .error-message {
                font-size: 24px;
            }
            
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-message">Страница не найдена</div>
        <div class="decoration"></div>
        <div class="message">
            Извините, страница, которую вы ищете, не существует или была перемещена.
            Возможно, вы ошиблись при вводе адреса или ссылка устарела.
        </div>
        <a href="/" class="btn">Вернуться на главную</a>
        <div class="footer">
            &copy; 2026 SteelStyle. Все права защищены.
        </div>
    </div>
</body>
</html>
